services:
  backend:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ./src/data/documents:/app/src/data/documents
      - ./src/data/chroma_db:/app/src/data/chroma_db

  frontend:
    build: .
    command: streamlit run src/frontend.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    env_file:
      - .env.docker
    depends_on:
      - backend